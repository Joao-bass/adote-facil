<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Adote Fácil - Proteção Animal</title>      <!-- Titulo -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="site.css">        <!-- arquivo css -->
</head>


<body>
                    <!-- Cabeçalho -->
    <header class="topo-imagem">

        <div class="fundo">

            <div class="banner-texto">

                <h1>Adote</h1></br>
    
                <h1>Fácil</h1></br>

                <p>Conectando animais resgatados a novos lares</p>

            </div>

        </div>

    </header>


                             <!-- Menu de navegação -->
    <nav class="menu">                             
        <ul>
            <li><a href="index.html">Inicio</a></li>
            <li><a href="animais.html">Animais</a></li>
            <li><a href="sobre.html">Sobre</a></li>
            <li><a href="contato.html">Contato</a></li>
            
        </ul>   
    </nav>

<main>
    <div class="cabecalho-formulario">

        <h2>Tenho Interesse na Adoção</h2>

        <p>Preencha seus dados e entraremos em contato em breve.</p>

    </div>

    <form class="formulario-interesse" id="formInteresse">

        <label for="nome">Nome Completo:</label><br>
        <input type="text" id="nome" name="nome"><br><br>

        <label for="telefone">Telefone:</label><br>
        <input type="tel" id="telefone" name="telefone"><br><br>

        <label for="email">E-mail:</label><br>
        <input type="email" id="email" name="email"><br><br>

        <label for="mensagem">Mensagem:</label><br>
        <textarea id="mensagem" name="mensagem" rows="3"></textarea><br><br>
        
        <button type="submit">Enviar Solicitação</button>
        <p id="mensagem-sucesso"></p>
    </form>

</main>



<footer>
    <p>2025 - Adote Fácil | Proteção Animal</p>
    <p>Projeto desenvolvido utilizando HTML, CSS e JavaScript</p>
</footer>



<script>

document.getElementById("formInteresse").addEventListener("submit", function(event){

    event.preventDefault();

    document.getElementById("mensagem-sucesso").innerHTML =
    "✅ Solicitação enviada com sucesso! Entraremos em contato em breve.";

});

</script>

</body>


</html>
